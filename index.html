<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightime Clock</title>
    <style>
 body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    /* We use a variable --vh that we will set with JavaScript */
    height: calc(var(--vh, 1vh) * 100); 
    overflow: hidden;
    background-color: #000;
}

.container {
    display: grid;
    grid-template-rows: repeat(4, 1fr); /* Divides into 4 equal rows */
    width: 100vw;
    height: calc(var(--vh, 1vh) * 100);
}

.row {
    width: 100%;
    transition: background-color 1s ease-in-out;
    border: 1px solid #111;
    box-sizing: border-box;
}

/* Blinking Animation stays the same */
@keyframes sync-blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.1; }
}

.blinking-active .row {
    animation: sync-blink 1s infinite;
}

        /* Central Plaza Colors */
        .color-red { background-color: #C11B17; }
        .color-white { background-color: #FFFFFF; }
        .color-purple { background-color: #6C3483; }
        .color-yellow { background-color: #D4AC0D; }
        .color-pink { background-color: #E6A2C5; }
        .color-green { background-color: #1D8348; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="row" id="row1"></div>
        <div class="row" id="row2"></div>
        <div class="row" id="row3"></div>
        <div class="row" id="row4"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Registered for Offline Use"));
}
        function fixHeight() {
    // Calculate 1% of the actual visible viewport height
    let vh = window.innerHeight * 0.01;
    // Set the value in the --vh custom property to the root of the document
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}

// Run the fix on load and when the screen is resized/rotated
window.addEventListener('resize', fixHeight);
window.addEventListener('orientationchange', fixHeight);
fixHeight();


        const hoursCycle = ['color-red', 'color-white', 'color-purple', 'color-yellow', 'color-pink', 'color-green'];
        const rowIds = ['row1', 'row2', 'row3', 'row4'];
        const container = document.getElementById('main-container');

        function updateClock() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const second = now.getSeconds();

            // 1. Calculate Colors
            const currentHourColorClass = hoursCycle[hour % hoursCycle.length];
            const nextHourColorClass = hoursCycle[(hour + 1) % hoursCycle.length];
            const fifteenMinBlock = Math.floor(minute / 15);

            // 2. Apply Colors to Rows
            for (let i = 0; i < rowIds.length; i++) {
                const row = document.getElementById(rowIds[i]);
                if (i < fifteenMinBlock) {
                    row.className = 'row ' + nextHourColorClass;
                } else {
                    row.className = 'row ' + currentHourColorClass;
                }
            }

            // 3. Sync Blink Logic
            // The blink should trigger at minutes 14, 29, 44, and 59
            const isLastMinuteOfBlock = (minute % 15 === 14);
            const isBlinkZone = isLastMinuteOfBlock && second >= 55;

            if (isBlinkZone) {
                container.classList.add('blinking-active');
            } else {
                container.classList.remove('blinking-active');
            }
        }

        // Check every second for precision
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
